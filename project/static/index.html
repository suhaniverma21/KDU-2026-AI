<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Function AI Assistant</title>
    <style>
        :root {
            --bg: linear-gradient(160deg, #f4efe6 0%, #e8f1ef 45%, #dfe7f7 100%);
            --panel: rgba(255, 252, 247, 0.85);
            --panel-border: rgba(73, 93, 115, 0.18);
            --text: #1f2933;
            --muted: #66788a;
            --user-bubble: #1f6f78;
            --assistant-bubble: #ffffff;
            --assistant-border: rgba(60, 88, 114, 0.14);
            --accent: #c96d42;
            --accent-hover: #ae5830;
            --error: #b9382f;
            --shadow: 0 24px 60px rgba(31, 41, 51, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--text);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .app-shell {
            width: min(960px, 100%);
            height: min(90vh, 900px);
            background: var(--panel);
            backdrop-filter: blur(18px);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-header {
            padding: 24px 28px 16px;
            border-bottom: 1px solid rgba(73, 93, 115, 0.1);
        }

        .app-title {
            margin: 0;
            font-size: clamp(1.6rem, 3vw, 2.4rem);
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .app-subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .message-row.assistant {
            justify-content: flex-start;
        }

        .message-group {
            max-width: min(78%, 680px);
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: fade-up 180ms ease-out;
        }

        .bubble {
            padding: 14px 16px;
            border-radius: 20px;
            line-height: 1.5;
            font-size: 1rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .bubble {
            background: var(--user-bubble);
            color: #f8fbfb;
            border-bottom-right-radius: 6px;
        }

        .assistant .bubble {
            background: var(--assistant-bubble);
            border: 1px solid var(--assistant-border);
            border-bottom-left-radius: 6px;
        }

        .usage-meta {
            min-height: 1em;
            padding: 0 4px;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .composer {
            padding: 16px 20px 20px;
            border-top: 1px solid rgba(73, 93, 115, 0.1);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 252, 247, 0.9));
        }

        .error-text {
            min-height: 1.2em;
            margin: 0 0 10px;
            color: var(--error);
            font-size: 0.9rem;
        }

        .composer-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input {
            flex: 1;
            resize: none;
            border: 1px solid rgba(73, 93, 115, 0.18);
            border-radius: 18px;
            padding: 14px 16px;
            font: inherit;
            font-size: 1rem;
            line-height: 1.45;
            min-height: 56px;
            max-height: 180px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            outline: none;
        }

        .message-input:focus {
            border-color: rgba(201, 109, 66, 0.6);
            box-shadow: 0 0 0 4px rgba(201, 109, 66, 0.12);
        }

        .send-button {
            border: 0;
            border-radius: 16px;
            padding: 15px 20px;
            min-width: 108px;
            font: inherit;
            font-weight: 600;
            color: #fff9f6;
            background: var(--accent);
            cursor: pointer;
            transition: background 120ms ease, transform 120ms ease;
        }

        .send-button:hover:enabled {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .send-button:disabled,
        .message-input:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 700px) {
            body {
                padding: 12px;
            }

            .app-shell {
                height: 95vh;
                border-radius: 22px;
            }

            .app-header {
                padding: 20px 18px 14px;
            }

            .chat-window {
                padding: 18px 14px 10px;
            }

            .composer {
                padding: 14px;
            }

            .composer-row {
                flex-direction: column;
                align-items: stretch;
            }

            .send-button {
                width: 100%;
            }

            .message-group {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <h1 class="app-title">Multi-Function AI Assistant</h1>
            <p class="app-subtitle">Weather, web search, and calculator tools with live streaming responses.</p>
        </header>

        <section id="chatWindow" class="chat-window" aria-live="polite"></section>

        <form id="chatForm" class="composer">
            <p id="inlineError" class="error-text"></p>
            <div class="composer-row">
                <textarea
                    id="messageInput"
                    class="message-input"
                    placeholder="Ask a question..."
                    maxlength="1000"
                    rows="1"
                ></textarea>
                <button id="sendButton" class="send-button" type="submit">Send</button>
            </div>
        </form>
    </main>

    <script>
        const chatWindow = document.getElementById("chatWindow");
        const chatForm = document.getElementById("chatForm");
        const messageInput = document.getElementById("messageInput");
        const sendButton = document.getElementById("sendButton");
        const inlineError = document.getElementById("inlineError");

        const conversationHistory = [];

        function autoResizeInput() {
            messageInput.style.height = "auto";
            messageInput.style.height = `${Math.min(messageInput.scrollHeight, 180)}px`;
        }

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function setWaitingState(isWaiting) {
            messageInput.disabled = isWaiting;
            sendButton.disabled = isWaiting;
        }

        function setInlineError(message) {
            inlineError.textContent = message;
        }

        function formatUsage(usage) {
            if (!usage) {
                return "";
            }

            const tokenCount = Number(usage.total_tokens || 0);
            const cost = Number(usage.estimated_cost_usd || 0).toFixed(6);
            return `${tokenCount} tokens · $${cost}`;
        }

        function addMessageBubble(role, content, usageText = "") {
            const row = document.createElement("div");
            row.className = `message-row ${role}`;

            const group = document.createElement("div");
            group.className = "message-group";

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.textContent = content;

            group.appendChild(bubble);

            let usageMeta = null;
            if (role === "assistant") {
                usageMeta = document.createElement("div");
                usageMeta.className = "usage-meta";
                usageMeta.textContent = usageText;
                group.appendChild(usageMeta);
            }

            row.appendChild(group);
            chatWindow.appendChild(row);
            scrollToBottom();

            return { bubble, usageMeta };
        }

        function appendAssistantError(message) {
            addMessageBubble("assistant", message, "");
        }

        function validateInput(message) {
            if (!message || !message.trim()) {
                return "Message cannot be empty";
            }

            if (message.length > 1000) {
                return "Message exceeds maximum length of 1000 characters";
            }

            return "";
        }

        async function streamChatResponse(payload, assistantMessage, assistantUsageMeta) {
            const response = await fetch("/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                let errorMessage = "Something went wrong. Please try again.";

                try {
                    const errorPayload = await response.json();
                    if (errorPayload.message) {
                        errorMessage = errorPayload.message;
                    }
                } catch (error) {
                    error;
                }

                throw new Error(errorMessage);
            }

            if (!response.body) {
                throw new Error("Something went wrong. Please try again.");
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) {
                    break;
                }

                buffer += decoder.decode(value, { stream: true });
                const events = buffer.split("\n\n");
                buffer = events.pop() || "";

                for (const eventBlock of events) {
                    const line = eventBlock
                        .split("\n")
                        .find((entry) => entry.startsWith("data: "));

                    if (!line) {
                        continue;
                    }

                    const data = line.slice(6);
                    if (data === "[DONE]") {
                        return;
                    }

                    const parsed = JSON.parse(data);
                    if (parsed.type === "text") {
                        assistantMessage.textContent += parsed.content;
                        scrollToBottom();
                    } else if (parsed.type === "usage") {
                        assistantUsageMeta.textContent = formatUsage(parsed.data);
                        scrollToBottom();
                    }
                }
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();
            setInlineError("");

            const userMessage = messageInput.value;
            const validationError = validateInput(userMessage);
            if (validationError) {
                setInlineError(validationError);
                return;
            }

            const trimmedMessage = userMessage.trim();
            conversationHistory.push({
                role: "user",
                content: trimmedMessage
            });

            addMessageBubble("user", trimmedMessage);
            messageInput.value = "";
            autoResizeInput();
            setWaitingState(true);

            const assistantParts = addMessageBubble("assistant", "", "");

            try {
                await streamChatResponse(
                    { messages: conversationHistory },
                    assistantParts.bubble,
                    assistantParts.usageMeta
                );

                conversationHistory.push({
                    role: "assistant",
                    content: assistantParts.bubble.textContent
                });
            } catch (error) {
                const fallbackMessage = "Something went wrong. Please try again.";
                assistantParts.bubble.textContent = fallbackMessage;
                if (assistantParts.usageMeta) {
                    assistantParts.usageMeta.textContent = "";
                }
                conversationHistory.push({
                    role: "assistant",
                    content: fallbackMessage
                });
            } finally {
                setWaitingState(false);
                messageInput.focus();
                scrollToBottom();
            }
        }

        chatForm.addEventListener("submit", handleSubmit);

        messageInput.addEventListener("input", () => {
            if (inlineError.textContent) {
                setInlineError("");
            }
            autoResizeInput();
        });

        messageInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                chatForm.requestSubmit();
            }
        });

        addMessageBubble(
            "assistant",
            "Hello. Ask about the weather, do a calculation, or search the web."
        );
        messageInput.focus();
        autoResizeInput();
    </script>
</body>
</html>
